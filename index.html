<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เด็กชายวิ่งวิบากเปิดเทอม 3 เลน 🧒🎒</title>
  <style>
    body{
      margin:0;
      background:#111;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      font-family: system-ui, -apple-system, "Prompt", sans-serif;
      color:#ffd700;
      padding:16px;
      user-select:none;
      -webkit-user-select:none;
      touch-action: manipulation;
    }
    .wrap{ width:min(920px, 100%); text-align:center; }
    h1{ margin:0 0 8px; text-shadow:0 0 10px rgba(255,215,0,.6); font-size:22px; }
    .hint{ margin:0 0 12px; color:#ddd; font-size:14px; }
    canvas{
      width:100%;
      max-width:920px;
      aspect-ratio: 16 / 6;
      background:#111;
      border-radius:16px;
      box-shadow:0 0 20px rgba(255,215,0,.35);
      border:1px solid rgba(255,215,0,.25);
      display:block;
      margin:0 auto;
      touch-action:none;
    }
    .bar{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:10px 0 0; }
    button{
      font-size:16px;
      padding:10px 16px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      background:linear-gradient(45deg, #d4af37, #ffcc00);
      color:#111;
      box-shadow:0 0 12px rgba(255,204,0,.35);
      font-weight:800;
    }
    .hud{ margin-top:10px; color:#eee; font-size:14px; }
    .hud b{ color:#00ff99; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🧒 เกมวิบากเปิดเทอม: เด็กชายวิ่ง 3 เลน 🎒</h1>
    <p class="hint">คอม: ← → เปลี่ยนเลน / Space กระโดด • มือถือ: แตะซ้าย-ขวาเปลี่ยนเลน / แตะกลางกระโดด</p>

    <canvas id="game" width="960" height="360"></canvas>

    <div class="bar">
      <button id="startBtn">เริ่มเกม</button>
      <button id="restartBtn">เริ่มใหม่</button>
      <button id="autostartBtn">เปิดแล้ววิ่งทันที</button>
    </div>

    <div class="hud">
      คะแนน: <b id="score">0</b> • เหรียญ: <b id="coins">0</b> • สถิติสูงสุด: <b id="best">0</b> • สถานะ: <b id="state">พร้อม</b>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const scoreEl = document.getElementById("score");
  const coinsEl = document.getElementById("coins");
  const bestEl = document.getElementById("best");
  const stateEl = document.getElementById("state");

  const W = canvas.width;
  const H = canvas.height;
  const horizon = 90;
  const roadBottom = H;

  let running = false;
  let score = 0;
  let coins = 0;
  let speed = 0.012;
  let frame = 0;
  let best = Number(localStorage.getItem("runner_best") || 0);
  bestEl.textContent = best;

  const player = {
    lane: 0,
    x: 0,
    y: 0,
    jump: 0,
    vy: 0,
    width: 52,
    height: 88,
    onGround: true
  };

  const obstacles = [];
  const obstacleTypes = ["gold", "cone", "bag"];

  function laneX(lane, y){
    const t = (y - horizon) / (roadBottom - horizon);
    return W / 2 + lane * (70 + t * 120);
  }

  function spawnObstacle(){
    obstacles.push({
      lane: [-1,0,1][Math.floor(Math.random() * 3)],
      z: 0.05,
      type: obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)]
    });
  }

  function jump(){
    if (!running) start();
    if (player.onGround){
      player.vy = 18;
      player.onGround = false;
    }
  }

  function moveLeft(){
    player.lane = Math.max(-1, player.lane - 1);
  }

  function moveRight(){
    player.lane = Math.min(1, player.lane + 1);
  }

  function start(){
    if (running) return;
    running = true;
    stateEl.textContent = "กำลังเล่น";
    requestAnimationFrame(loop);
  }

  function reset(){
    running = false;
    score = 0;
    coins = 0;
    frame = 0;
    obstacles.length = 0;
    player.lane = 0;
    player.jump = 0;
    player.vy = 0;
    player.onGround = true;
    scoreEl.textContent = 0;
    coinsEl.textContent = 0;
    stateEl.textContent = "พร้อม";
    draw();
  }

  function gameOver(){
    running = false;
    stateEl.textContent = "จบเกม";

    if (score > best){
      best = Math.floor(score);
      localStorage.setItem("runner_best", best);
      bestEl.textContent = best;
    }
  }

  function update(){
    frame++;
    score += 0.6;
    scoreEl.textContent = Math.floor(score);

    if (frame % 70 === 0){
      spawnObstacle();
    }

    if (!player.onGround){
      player.jump += player.vy;
      player.vy -= 1;

      if (player.jump <= 0){
        player.jump = 0;
        player.vy = 0;
        player.onGround = true;
      }
    }

    for(let i = obstacles.length - 1; i >= 0; i--){
      const o = obstacles[i];
      o.z += speed;

      if (o.z > 1.1){
        obstacles.splice(i,1);
        continue;
      }

      if (o.z > 0.82 && Math.abs(o.lane - player.lane) < 0.1 && player.jump < 40){
        gameOver();
      }
    }
  }

  function drawBackground(){
    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,"#7a0000");
    bg.addColorStop(1,"#0a0a0a");
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = "#1a1a1a";
    ctx.beginPath();
    ctx.moveTo(W*0.18, H);
    ctx.lineTo(W*0.42, horizon);
    ctx.lineTo(W*0.58, horizon);
    ctx.lineTo(W*0.82, H);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,.5)";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(W*0.38, H);
    ctx.lineTo(W*0.47, horizon);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(W*0.62, H);
    ctx.lineTo(W*0.53, horizon);
    ctx.stroke();
  }

  function drawPlayer(){
    const px = laneX(player.lane, 300);
    const py = 300 - player.jump;

    // shadow
    ctx.fillStyle = "rgba(0,0,0,.3)";
    ctx.beginPath();
    ctx.ellipse(px, 312, 28, 8, 0, 0, Math.PI*2);
    ctx.fill();

    // head
    ctx.fillStyle = "#ffd1a3";
    ctx.beginPath();
    ctx.arc(px, py - 60, 14, 0, Math.PI*2);
    ctx.fill();

    // hair
    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(px, py - 65, 13, Math.PI, Math.PI*2);
    ctx.fill();

    // body
    ctx.fillStyle = "white";
    ctx.fillRect(px - 14, py - 45, 28, 35);

    // tie
    ctx.fillStyle = "red";
    ctx.fillRect(px - 2, py - 40, 4, 20);

    // shorts
    ctx.fillStyle = "#111";
    ctx.fillRect(px - 14, py - 10, 28, 12);

    // legs
    ctx.strokeStyle = "#ffd1a3";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(px - 8, py + 2);
    ctx.lineTo(px - 12, py + 20);
    ctx.moveTo(px + 8, py + 2);
    ctx.lineTo(px + 12, py + 20);
    ctx.stroke();
  }

  function drawObstacle(o){
    const y = horizon + o.z * 230;
    const x = laneX(o.lane, y);
    const scale = 0.2 + o.z * 1.2;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);

    if (o.type === "gold"){
      ctx.fillStyle = "gold";
      ctx.fillRect(-25,-18,50,28);
    }

    if (o.type === "cone"){
      ctx.fillStyle = "orange";
      ctx.beginPath();
      ctx.moveTo(0,-25);
      ctx.lineTo(-20,15);
      ctx.lineTo(20,15);
      ctx.closePath();
      ctx.fill();
    }

    if (o.type === "bag"){
      ctx.fillStyle = "#c40000";
      ctx.fillRect(-20,-25,40,40);
    }

    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    drawBackground();

    for(const o of obstacles){
      drawObstacle(o);
    }

    drawPlayer();

    if (!running){
      ctx.fillStyle = "rgba(0,0,0,.4)";
      ctx.fillRect(0,0,W,H);

      ctx.fillStyle = "#ffd700";
      ctx.font = "bold 34px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("กดเริ่มเกม", W/2, H/2);
    }
  }

  function loop(){
    if (!running){
      draw();
      return;
    }

    update();
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById("startBtn").onclick = () => start();
  document.getElementById("restartBtn").onclick = () => reset();
  document.getElementById("autostartBtn").onclick = () => {
    reset();
    start();
  };

  window.addEventListener("keydown", (e) => {
    if (e.code === "ArrowLeft") moveLeft();
    if (e.code === "ArrowRight") moveRight();
    if (e.code === "Space" || e.code === "ArrowUp") jump();
  });

  canvas.addEventListener("pointerdown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;

    if (x < rect.width * 0.33) moveLeft();
    else if (x > rect.width * 0.66) moveRight();
    else jump();
  });

  reset();
})();
</script>
</body>
</html>
