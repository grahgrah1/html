<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบเก็บสต็อกผัก 🥬</title>
  <style>
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Prompt",sans-serif;
      background:#f4f8f1;
      color:#1d2b1f;
    }
    header{
      background:linear-gradient(135deg,#1f7a3a,#74b72e);
      color:white;
      padding:24px 18px;
      text-align:center;
      box-shadow:0 6px 20px rgba(0,0,0,.15);
    }
    header h1{ margin:0; font-size:28px; }
    header p{ margin:8px 0 0; opacity:.95; }
    .container{
      max-width:1100px;
      margin:24px auto;
      padding:0 16px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
      margin-bottom:18px;
    }
    .card{
      background:white;
      border-radius:18px;
      padding:18px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      border:1px solid #e1ecd9;
    }
    .stat-title{ color:#6a7b67; font-size:14px; }
    .stat-value{ font-size:28px; font-weight:900; margin-top:4px; }
    .form-card{ margin-bottom:18px; }
    form{
      display:grid;
      grid-template-columns:1.2fr .8fr .8fr .8fr .8fr auto;
      gap:10px;
      align-items:end;
    }
    label{ font-size:13px; color:#5c6b59; font-weight:700; }
    input,select{
      width:100%;
      padding:11px 12px;
      border:1px solid #cfddc7;
      border-radius:12px;
      font-size:15px;
      outline:none;
      background:#fbfff8;
    }
    input:focus,select:focus{ border-color:#3fa35b; box-shadow:0 0 0 3px rgba(63,163,91,.15); }
    button{
      border:none;
      border-radius:12px;
      padding:12px 14px;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
    }
    .btn-main{ background:#1f7a3a; color:white; }
    .btn-main:hover{ background:#155d2b; }
    .btn-edit{ background:#ffe08a; color:#4d3900; }
    .btn-delete{ background:#ffb3b3; color:#730000; }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
    }
    .toolbar input{ max-width:340px; }
    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:14px;
    }
    th,td{
      padding:13px 10px;
      border-bottom:1px solid #eef3ea;
      text-align:left;
      font-size:14px;
    }
    th{ background:#edf7e8; color:#335c35; }
    tr:hover{ background:#fbfff7; }
    .status{
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
    }
    .ok{ background:#dff7df; color:#1d6b26; }
    .low{ background:#fff0b8; color:#806000; }
    .empty{ background:#ffd6d6; color:#9b0000; }
    .actions{ display:flex; gap:6px; flex-wrap:wrap; }
    .note{ color:#6c7868; font-size:13px; margin-top:10px; }
    @media(max-width:900px){
      .grid{ grid-template-columns:repeat(2,1fr); }
      form{ grid-template-columns:1fr 1fr; }
    }
    @media(max-width:620px){
      .grid{ grid-template-columns:1fr; }
      form{ grid-template-columns:1fr; }
      table{ display:block; overflow-x:auto; }
      header h1{ font-size:23px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🥬 ระบบเก็บสต็อกผัก</h1>
    <p>บันทึกจำนวนผัก ต้นทุน วันรับเข้า และสถานะคงเหลือ</p>
  </header>

  <main class="container">
    <section class="grid">
      <div class="card">
        <div class="stat-title">รายการผักทั้งหมด</div>
        <div class="stat-value" id="totalItems">0</div>
      </div>
      <div class="card">
        <div class="stat-title">จำนวนรวม</div>
        <div class="stat-value" id="totalQty">0</div>
      </div>
      <div class="card">
        <div class="stat-title">มูลค่าสต็อก</div>
        <div class="stat-value" id="totalValue">฿0</div>
      </div>
      <div class="card">
        <div class="stat-title">ใกล้หมด / หมด</div>
        <div class="stat-value" id="lowItems">0</div>
      </div>
    </section>

    <section class="card form-card">
      <form id="stockForm">
        <div>
          <label>ชื่อผัก</label>
          <select id="name" required>
            <option value="">เลือกชนิดผัก</option>
            <option>คะน้า</option>
            <option>ผักกาดขาว</option>
            <option>ผักบุ้ง</option>
            <option>กะหล่ำปลี</option>
            <option>กวางตุ้ง</option>
            <option>แตงกวา</option>
            <option>พริก</option>
            <option>มะเขือเทศ</option>
            <option>ต้นหอม</option>
            <option>ผักชี</option>
            <option>แครอท</option>
            <option>ฟักทอง</option>
            <option>ถั่วฝักยาว</option>
            <option>บรอกโคลี</option>
            <option>เห็ด</option>
            <option>ข้าวโพดอ่อน</option>
            <option>ใบโหระพา</option>
            <option>กะเพรา</option>
            <option>ขึ้นฉ่าย</option>
          </select>
        </div>
        <div>
          <label>จำนวน</label>
          <select id="qty" required>
            <option value="">เลือกจำนวน</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>5</option>
            <option>10</option>
            <option>15</option>
            <option>20</option>
            <option>25</option>
            <option>30</option>
            <option>50</option>
            <option>100</option>
          </select>
        </div>
        <div>
          <label>หน่วย</label>
          <select id="unit">
            <option>กก.</option>
            <option>มัด</option>
            <option>ถุง</option>
            <option>ลัง</option>
            <option>ชิ้น</option>
          </select>
        </div>
        <div>
          <label>ต้นทุน/หน่วย</label>
          <select id="cost" required>
            <option value="">เลือกต้นทุน/หน่วย</option>
            <option>5</option>
            <option>10</option>
            <option>15</option>
            <option>20</option>
            <option>25</option>
            <option>30</option>
            <option>35</option>
            <option>40</option>
            <option>50</option>
            <option>80</option>
            <option>100</option>
          </select>
        </div>
        <div>
          <label>วันรับเข้า</label>
          <select id="date" required>
            <option value="2026-05-10">วันนี้</option>
            <option value="2026-05-09">เมื่อวาน</option>
            <option value="2026-05-08">2 วันที่แล้ว</option>
          </select>
        </div>
        <button class="btn-main" type="submit" id="submitBtn">เพิ่มสต็อก</button>
      </form>
      <div class="note">ข้อมูลจะถูกเก็บในเครื่องนี้ด้วย LocalStorage เปิดใหม่แล้วยังอยู่ ✅</div>
    </section>

    <section class="card">
      <div class="toolbar">
        <h2 style="margin:0">📦 รายการสต็อกผัก</h2>
        <input id="search" placeholder="ค้นหาชื่อผัก..." />
      </div>
      <table>
        <thead>
          <tr>
            <th>ชื่อผัก</th>
            <th>จำนวน</th>
            <th>ต้นทุน/หน่วย</th>
            <th>มูลค่า</th>
            <th>วันรับเข้า</th>
            <th>สถานะ</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        <tbody id="stockTable"></tbody>
      </table>
    </section>
  </main>

<script>
  const form = document.getElementById('stockForm');
  const nameInput = document.getElementById('name');
  const qtyInput = document.getElementById('qty');
  const unitInput = document.getElementById('unit');
  const costInput = document.getElementById('cost');
  const dateInput = document.getElementById('date');
  const submitBtn = document.getElementById('submitBtn');
  const table = document.getElementById('stockTable');
  const searchInput = document.getElementById('search');

  let stocks = JSON.parse(localStorage.getItem('vegetable_stocks') || '[]');
  let editId = null;

  dateInput.valueAsDate = new Date();

  function save(){
    localStorage.setItem('vegetable_stocks', JSON.stringify(stocks));
  }

  function money(n){
    return '฿' + Number(n).toLocaleString('th-TH', { maximumFractionDigits:2 });
  }

  function getStatus(qty){
    if(qty <= 0) return { text:'หมด', cls:'empty' };
    if(qty <= 5) return { text:'ใกล้หมด', cls:'low' };
    return { text:'ปกติ', cls:'ok' };
  }

  function render(){
    const keyword = searchInput.value.trim().toLowerCase();
    const filtered = stocks.filter(item => item.name.toLowerCase().includes(keyword));

    table.innerHTML = filtered.map(item => {
      const status = getStatus(Number(item.qty));
      const value = Number(item.qty) * Number(item.cost);
      return `
        <tr>
          <td><b>${item.name}</b></td>
          <td>${item.qty} ${item.unit}</td>
          <td>${money(item.cost)}</td>
          <td>${money(value)}</td>
          <td>${item.date}</td>
          <td><span class="status ${status.cls}">${status.text}</span></td>
          <td>
            <div class="actions">
              <button class="btn-edit" onclick="editItem('${item.id}')">แก้ไข</button>
              <button class="btn-delete" onclick="deleteItem('${item.id}')">ลบ</button>
            </div>
          </td>
        </tr>
      `;
    }).join('') || `<tr><td colspan="7" style="text-align:center;color:#777">ยังไม่มีรายการสต็อก</td></tr>`;

    updateStats();
  }

  function updateStats(){
    const totalItems = stocks.length;
    const totalQty = stocks.reduce((sum,item) => sum + Number(item.qty), 0);
    const totalValue = stocks.reduce((sum,item) => sum + Number(item.qty) * Number(item.cost), 0);
    const lowItems = stocks.filter(item => Number(item.qty) <= 5).length;

    document.getElementById('totalItems').textContent = totalItems;
    document.getElementById('totalQty').textContent = totalQty.toLocaleString('th-TH');
    document.getElementById('totalValue').textContent = money(totalValue);
    document.getElementById('lowItems').textContent = lowItems;
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();

    const item = {
      id: editId || Date.now().toString(),
      name: nameInput.value.trim(),
      qty: Number(qtyInput.value),
      unit: unitInput.value,
      cost: Number(costInput.value),
      date: dateInput.value
    };

    if(editId){
      stocks = stocks.map(s => s.id === editId ? item : s);
      editId = null;
      submitBtn.textContent = 'เพิ่มสต็อก';
    }else{
      stocks.push(item);
    }

    save();
    form.reset();
    dateInput.valueAsDate = new Date();
    render();
  });

  window.editItem = function(id){
    const item = stocks.find(s => s.id === id);
    if(!item) return;

    editId = id;
    nameInput.value = item.name;
    qtyInput.value = item.qty;
    unitInput.value = item.unit;
    costInput.value = item.cost;
    dateInput.value = item.date;
    submitBtn.textContent = 'บันทึกแก้ไข';
    window.scrollTo({ top:0, behavior:'smooth' });
  }

  window.deleteItem = function(id){
    if(confirm('ต้องการลบรายการนี้ใช่ไหม?')){
      stocks = stocks.filter(s => s.id !== id);
      save();
      render();
    }
  }

  searchInput.addEventListener('input', render);
  render();
</script>
</body>
</html>
