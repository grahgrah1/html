<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knife Hit 🔪</title>
  <style>
    body{
      margin:0;
      background:#111;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:system-ui,sans-serif;
      color:white;
    }

    .wrap{
      text-align:center;
      width:100%;
      max-width:900px;
    }

    canvas{
      background:radial-gradient(circle at center,#2a2a2a,#090909);
      border-radius:18px;
      box-shadow:0 0 25px rgba(255,215,0,.25);
      width:100%;
      max-width:900px;
    }

    h1{
      color:#ffd700;
      margin-bottom:10px;
      text-shadow:0 0 12px rgba(255,215,0,.5);
    }

    .hud{
      margin-top:12px;
      font-size:18px;
    }

    b{
      color:#00ff99;
    }

    button{
      margin-top:12px;
      padding:10px 18px;
      border:none;
      border-radius:12px;
      background:linear-gradient(45deg,#ffcc00,#d4af37);
      color:#111;
      font-weight:800;
      cursor:pointer;
      font-size:16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔪 เกมปามีด</h1>

    <canvas id="game" width="900" height="600"></canvas>

    <div class="hud">
      คะแนน: <b id="score">0</b>
      • มีดเหลือ: <b id="knives">10</b>
      • ด่าน: <b id="level">1</b>
    </div>

    <button id="restartBtn">เริ่มใหม่</button>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const scoreEl = document.getElementById('score');
  const knivesEl = document.getElementById('knives');
  const levelEl = document.getElementById('level');
  const restartBtn = document.getElementById('restartBtn');

  const W = canvas.width;
  const H = canvas.height;

  let score = 0;
  let level = 1;
  let knivesLeft = 10;
  let gameOver = false;

  const target = {
    x: W/2,
    y: 200,
    radius: 90,
    angle: 0,
    speed: 0.03
  };

  const stuckKnives = [];
  const flyingKnives = [];

  function reset(){
    score = 0;
    level = 1;
    knivesLeft = 10;
    gameOver = false;

    target.speed = 0.03;
    stuckKnives.length = 0;
    flyingKnives.length = 0;

    updateHUD();
    loop();
  }

  function updateHUD(){
    scoreEl.textContent = score;
    knivesEl.textContent = knivesLeft;
    levelEl.textContent = level;
  }

  function throwKnife(){
    if(gameOver || knivesLeft <= 0) return;

    flyingKnives.push({
      x: W/2,
      y: H - 80,
      speed: 14
    });

    knivesLeft--;
    updateHUD();
  }

  function nextLevel(){
    level++;
    knivesLeft = 10;
    stuckKnives.length = 0;
    flyingKnives.length = 0;

    target.speed += 0.01;

    updateHUD();
  }

  function endGame(){
    gameOver = true;
  }

  function update(){
    target.angle += target.speed;

    for(let i = flyingKnives.length - 1; i >= 0; i--){
      const k = flyingKnives[i];
      k.y -= k.speed;

      if(k.y <= target.y + target.radius){

        const hitAngle = (Math.PI * 1.5 - target.angle) % (Math.PI * 2);

        for(const s of stuckKnives){
          let diff = Math.abs(hitAngle - s.angle);
          diff = Math.min(diff, Math.PI * 2 - diff);

          if(diff < 0.25){
            endGame();
            return;
          }
        }

        stuckKnives.push({ angle: hitAngle });
        flyingKnives.splice(i,1);

        score += 10;

        if(knivesLeft <= 0){
          nextLevel();
        }

        updateHUD();
      }
    }
  }

  function drawTarget(){
    ctx.save();
    ctx.translate(target.x, target.y);
    ctx.rotate(target.angle);

    const grad = ctx.createRadialGradient(0,0,20,0,0,target.radius);
    grad.addColorStop(0,'#8b5a2b');
    grad.addColorStop(1,'#3d220f');

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0,0,target.radius,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 5;
    ctx.stroke();

    for(const k of stuckKnives){
      ctx.save();
      ctx.rotate(k.angle);

      ctx.fillStyle = '#ddd';
      ctx.fillRect(-4,-target.radius-45,8,50);

      ctx.fillStyle = '#8b0000';
      ctx.beginPath();
      ctx.moveTo(-10,-target.radius+5);
      ctx.lineTo(0,-target.radius-15);
      ctx.lineTo(10,-target.radius+5);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    ctx.restore();
  }

  function drawFlyingKnives(){
    for(const k of flyingKnives){
      ctx.fillStyle = '#ddd';
      ctx.fillRect(k.x - 4, k.y - 40, 8, 50);

      ctx.fillStyle = '#8b0000';
      ctx.beginPath();
      ctx.moveTo(k.x - 10, k.y - 40);
      ctx.lineTo(k.x, k.y - 60);
      ctx.lineTo(k.x + 10, k.y - 40);
      ctx.closePath();
      ctx.fill();
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#1d0000');
    bg.addColorStop(1,'#050505');

    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    drawTarget();
    drawFlyingKnives();

    if(gameOver){
      ctx.fillStyle = 'rgba(0,0,0,.55)';
      ctx.fillRect(0,0,W,H);

      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 52px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W/2, H/2);

      ctx.fillStyle = '#fff';
      ctx.font = '24px sans-serif';
      ctx.fillText('กดปุ่มเริ่มใหม่เพื่อเล่นอีกครั้ง', W/2, H/2 + 50);
    }
  }

  function loop(){
    if(gameOver){
      draw();
      return;
    }

    update();
    draw();
    requestAnimationFrame(loop);
  }

  window.addEventListener('keydown', (e) => {
    if(e.code === 'Space'){
      e.preventDefault();
      throwKnife();
    }
  });

  canvas.addEventListener('pointerdown', () => {
    throwKnife();
  });

  restartBtn.onclick = () => reset();

  reset();
})();
</script>
</body>
</html>
